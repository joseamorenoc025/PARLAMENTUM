<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ciudadano | Cerebro Legislativo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="logo-area">
                    <div class="logo-icon">
                        <img id="institutional-logo" src="" alt="" style="width: 100%; height: 100%; object-fit: contain; display: none;" onload="this.style.display='block'; this.previousElementSibling.style.display='none';">
                        <i data-lucide="gavel"></i>
                    </div>
                    <div>
                        <h1 id="chamber-name-display">Cerebro Legislativo</h1>
                        <p>Transparencia y Acceso a la Información</p>
                    </div>
                </div>
                <nav class="main-nav">
                    <button class="nav-btn active" data-view="laws">Leyes</button>
                    <button class="nav-btn" data-view="agenda">Agenda</button>
                    <button class="nav-btn" data-view="legislators">Legisladores</button>
                </nav>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section" id="search-section">
            <div class="container">
                <div class="search-card">
                    <div class="search-input-wrapper">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="search-input" placeholder="Buscar...">
                    </div>
                    <div class="filters" id="filters-container">
                        <!-- Filtros dinámicos según la vista -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="container">
            <div id="status-message" class="status-message hidden"></div>
            
            <!-- Grid Universal para Leyes, Agenda y Legisladores -->
            <div id="main-grid" class="main-grid">
                <div class="loader">
                    <div class="spinner"></div>
                    <p>Cargando información...</p>
                </div>
            </div>

            <!-- Vista Detalle de Legislador (Hidden by default) -->
            <div id="legislator-profile" class="legislator-profile hidden">
                <!-- Se llena dinámicamente -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <div class="footer-content">
                    <div>
                        <p>&copy; 2026 <span id="footer-chamber-name">Cerebro Legislativo</span></p>
                        <p class="footer-note">Portal de Transparencia Parlamentaria</p>
                    </div>
                    <div class="header-status">
                        <span id="last-update">Actualizado hoy</span>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
