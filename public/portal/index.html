<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ciudadano | Cerebro Legislativo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="logo-area">
                    <img id="institutional-logo" src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                    <div class="logo-icon" style="display:none">
                        <i data-lucide="gavel"></i>
                    </div>
                    <div>
                        <h1 id="chamber-name-display">Cerebro Legislativo</h1>
                        <p>Transparencia y Acceso a la Información</p>
                    </div>
                </div>
                <div class="header-status">
                    <span id="last-update">Sincronizado</span>
                </div>
            </div>
        </header>

        <!-- Navigation Bar -->
        <nav class="nav-bar">
            <div class="container">
                <div class="nav-links">
                    <button class="nav-btn active" data-view="laws">
                        <i data-lucide="scale"></i> Biblioteca de Leyes
                    </button>
                    <button class="nav-btn" data-view="agenda">
                        <i data-lucide="calendar"></i> Agenda Legislativa
                    </button>
                    <button class="nav-btn" data-view="legislators">
                        <i data-lucide="users"></i> Conoce a tus Legisladores
                    </button>
                </div>
            </div>
        </nav>

        <!-- Search Section -->
        <section id="search-section" class="search-section">
            <div class="container">
                <div class="search-card">
                    <div class="search-input-wrapper">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="search-input" placeholder="Buscar información...">
                    </div>
                    <div id="filters-container" class="filters">
                        <!-- Filtros dinámicos según la vista -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="container">
            <div id="status-message" class="status-message hidden"></div>
            
            <!-- Grid Principal (Leyes, Proyectos, Legisladores) -->
            <div id="main-grid" class="main-grid">
                <div class="loader">
                    <div class="spinner"></div>
                    <p>Cargando información...</p>
                </div>
            </div>

            <!-- Detalle de Legislador (Perfil) -->
            <div id="legislator-profile" class="legislator-profile hidden">
                <!-- Se carga dinámicamente -->
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 <span id="footer-chamber-name">CLEBDA</span>. Todos los derechos reservados.</p>
                <p class="footer-note">Sistema Segundo Cerebro Legislativo</p>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
