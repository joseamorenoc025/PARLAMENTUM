<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ciudadano | Cerebro Legislativo</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="logo-area">
                    <div class="logo-icon">
                        <img id="chamber-logo" src="logo.png" alt="Logo" onerror="this.style.display='none'; document.getElementById('fallback-icon').style.display='block';">
                        <i id="fallback-icon" data-lucide="gavel" style="display:none;"></i>
                    </div>
                    <div>
                        <h1 id="chamber-name">Cerebro Legislativo</h1>
                        <p>Transparencia y Acceso a la Información</p>
                    </div>
                </div>
                <div class="header-status">
                    <span id="last-update">Cargando...</span>
                </div>
            </div>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="container">
                <div class="search-card">
                    <div class="search-input-wrapper">
                        <i data-lucide="search" class="search-icon"></i>
                        <input type="text" id="search-input" placeholder="Buscar por título, expediente o palabra clave...">
                    </div>
                    <div class="filters">
                        <select id="filter-year">
                            <option value="">Todos los años</option>
                        </select>
                        <select id="filter-type">
                            <option value="">Todos los tipos</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <!-- Main Content -->
        <main class="container">
            <div id="status-message" class="status-message hidden"></div>
            <div id="laws-grid" class="laws-grid">
                <!-- Las leyes se cargarán aquí -->
                <div class="loader">
                    <div class="spinner"></div>
                    <p>Cargando biblioteca de leyes...</p>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 <span id="footer-chamber-name">Concejo Municipal</span>. Todos los derechos reservados.</p>
                <p class="footer-note">Desarrollado por <strong>José Moreno</strong> (joseamorenoc025@gmail.com)</p>
            </div>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
