name: Dependency Security Scan

on:
  schedule:
    - cron: '0 2 * * 1'  # Todos los lunes a las 2 AM UTC
  workflow_dispatch:      # Permite ejecución manual

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        run: |
          mkdir -p reports
          npm audit --audit-level=high --json > reports/npm-audit.json || true
          HIGH=$(jq '.metadata.vulnerabilities.high + .metadata.vulnerabilities.critical' reports/npm-audit.json)
          if [ "$HIGH" -gt 0 ]; then 
            echo "❌ Found $HIGH high/critical vulnerabilities"
            exit 1
          fi
          echo "✅ No high/critical vulnerabilities found"

  # Opcional: Snyk (solo si se configura el secret SNYK_TOKEN)
  snyk:
    name: Snyk Test
    runs-on: ubuntu-latest
    if: false # Desactivado por defecto hasta tener el Token
    steps:
      - uses: actions/checkout@v6
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
